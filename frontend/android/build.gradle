// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    maven { url 'http://maven.aliyun.com/repository/public/'; allowInsecureProtocol true }
    maven { url 'http://maven.aliyun.com/repository/google/'; allowInsecureProtocol true }
    maven { url 'http://maven.aliyun.com/repository/gradle-plugin/'; allowInsecureProtocol true }
    maven { url 'http://dl.google.com/dl/android/maven2'; allowInsecureProtocol true }
    maven { url 'http://repo.maven.apache.org/maven2'; allowInsecureProtocol true }
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    maven { url 'http://maven.aliyun.com/repository/public/'; allowInsecureProtocol true }
    maven { url 'http://maven.aliyun.com/repository/google/'; allowInsecureProtocol true }
    maven { url 'http://maven.aliyun.com/repository/gradle-plugin/'; allowInsecureProtocol true }
    maven { url 'http://dl.google.com/dl/android/maven2'; allowInsecureProtocol true }
    maven { url 'http://repo.maven.apache.org/maven2'; allowInsecureProtocol true }
    maven { url 'http://jitpack.io'; allowInsecureProtocol true }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
