name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'hf-deploy/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Sync Backend Files to hf-deploy
        run: |
          cp backend/server.py hf-deploy/
          cp backend/requirements.txt hf-deploy/

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -U "huggingface_hub[cli]"
          # Gunakan hf upload (pengganti huggingface-cli) untuk menghindari masalah Git Authentication
          hf upload mit147a/budgetwise-api ./hf-deploy . --repo-type space --token $HF_TOKEN --commit-message "Auto-deploy: sync backend to Hugging Face"
